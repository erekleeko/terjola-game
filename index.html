<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თერჯოლის მცოდნე</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="loading" style="text-align: center;">მონაცემები იტვირთება...</div>
        
        <div id="game-content" style="display: none;">
            <div id="location-header">
                <h2>ლოკაცია: <span id="location-name"></span></h2>
            </div>
            
            <div id="question-box">
                <p id="question-text"></p>
            </div>
            
            <div id="options-container"></div>
            
            <div id="controls">
                <button id="hint-btn" onclick="showHint()">მინიშნება 🔍</button>
            </div>
            
            <div id="score-board">
                <p>ქულა: <span id="score">0</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
