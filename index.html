<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>თერჯოლის მცოდნე</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <div id="loading" class="screen">
            <h2>მონაცემები იტვირთება...</h2>
        </div>

        <div id="welcome-screen" class="screen" style="display: none;">
            <div class="welcome-box">
                <h2>მოგესალმებით!</h2>
                <p>თამაშის დასაწყებად, გთხოვთ შეიყვანოთ თქვენი მონაცემები</p>
                <input type="text" id="player-name" placeholder="სახელი და გვარი" required>
                <button id="auth-btn" onclick="startGame()">დაწყება</button>
            </div>
        </div>
        
        <div id="intro-screen" class="screen" style="display: none;">
            <div class="intro-overlay">
                <div id="intro-text-container">
                    <p id="intro-text"></p>
                </div>
                <button id="start-journey-btn" style="display: none;" onclick="startJourney()">რუკაზე გადასვლა</button>
            </div>
        </div>

        <div id="map-screen" class="screen" style="display: none;">
            <h2 id="level-title"></h2>
            <div id="map-visual">
                <img src="map.png" alt="თერჯოლის რუკა">
                <img src="character.png" id="character-img" alt="პერსონაჟი">
            </div>
            <p style="font-weight: bold; margin-top: 15px;">მზად ხარ კითხვებისთვის?</p>
            <button id="start-level-btn" onclick="startLevelQuestions()">წინ!</button>
        </div>

        <div id="game-content" class="screen" style="display: none;">
            <div id="location-header">
                <h2>ლოკაცია: <span id="location-name"></span></h2>
                <p>კითხვა <span id="current-q-num">1</span> / <span id="total-q-num">10</span></p>
            </div>
            <div id="question-box">
                <p id="question-text"></p>
            </div>
            <div id="options-container"></div>
            <div id="controls">
                <button id="hint-btn" onclick="showHint()">მინიშნება 🔍</button>
            </div>
            <div id="score-board">
                <p>საერთო ქულა: <span id="score">0</span></p>
            </div>
        </div>

        <div id="leaderboard-screen" class="screen" style="display: none;">
            <div class="welcome-box" style="max-width: 600px; margin: 0 auto;">
                <h2 id="final-message">გილოცავთ!</h2>
                <h3 id="final-score-display"></h3>
                <p id="save-status" style="color: #8b5a2b; font-weight: bold;">შედეგი ინახება ბაზაში...</p>
                
                <hr style="border: 1px solid #eaddc5; margin: 20px 0;">
                <h3>🏆 საუკეთესო მოთამაშეები 🏆</h3>
                <div id="leaderboard-list" style="text-align: left; max-height: 220px; overflow-y: auto; padding: 10px; background: #f4e8d1; border-radius: 8px;">
                    </div>
                
                <button onclick="location.reload()" style="background: #8b5a2b; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; font-size: 16px; width: 100%;">თავიდან დაწყება</button>
            </div>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
